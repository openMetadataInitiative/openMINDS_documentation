name: htaccess-deploy

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: pipeline
          path: pipeline

      - name: Set up environment
        run: |
          sudo apt-get update
          sudo apt-get install -y lftp
          echo "Running post-build deployment for .htaccess"
          cd pipeline
          pip install -r requirements.txt
          python pipeline/redirect_map.py
        
      - name: Upload .htaccess via SFTP
        env:
          FTP_SERVER: ${{ vars.FTP_SERVER }}
          SFTP_PORT: ${{ vars.SFTP_PORT }}
          FTP_USER: ${{ vars.FTP_USER }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
        run: |
           cd pipeline
           ls -alh
           lftp -u $FTP_USER,$FTP_PASSWORD -e "put .htaccess; bye" $FTP_SERVER
